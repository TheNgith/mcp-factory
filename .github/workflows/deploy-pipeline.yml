# .github/workflows/deploy-pipeline.yml
#
# Builds and deploys the pipeline container (Dockerfile) to ACA.
# Triggered whenever api/, src/, or Dockerfile changes on main.
#
# ── Required GitHub Secrets ──────────────────────────────────────────────
#   AZURE_CLIENT_ID       → mcp-factory-identity clientId
#                           f70e3ce7-3790-49de-95b0-2de22fc0adbe
#   AZURE_TENANT_ID       → bfddc1f5-1e88-471c-9b5e-44611ddd3c22
#   AZURE_SUBSCRIPTION_ID → abb10328-e7f1-4d4a-9067-c1967fd70429
#
# ── One-time Azure setup (OIDC federated credential) ─────────────────────
#   az identity federated-credential create \
#     --name github-actions \
#     --identity-name mcp-factory-identity \
#     --resource-group mcp-factory-rg \
#     --issuer https://token.actions.githubusercontent.com \
#     --subject repo:evanking12/mcp-factory:ref:refs/heads/main \
#     --audiences api://AzureADTokenExchange
#
#   Also ensure mcp-factory-identity has AcrPush on mcpfactoryacr and
#   Contributor on mcp-factory-rg.
# ────────────────────────────────────────────────────────────────────────

name: Deploy Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'src/**'
      - 'Dockerfile'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  ACR:        mcpfactoryacr.azurecr.io
  IMAGE:      mcpfactoryacr.azurecr.io/mcp-factory-pipeline
  APP_NAME:   mcp-factory-pipeline
  RG:         mcp-factory-rg

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name mcpfactoryacr

      - name: Build & push image
        run: |
          IMAGE_TAG="${{ env.IMAGE }}:${{ github.sha }}"
          IMAGE_LATEST="${{ env.IMAGE }}:latest"
          docker build -f Dockerfile -t "$IMAGE_TAG" -t "$IMAGE_LATEST" .
          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RG }} \
            --image ${{ env.IMAGE }}:${{ github.sha }}

      - name: Verify deployment
        run: |
          URL=$(az containerapp show \
            --name ${{ env.APP_NAME }} \
            --resource-group ${{ env.RG }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "Pipeline URL: https://$URL"
          # Wait up to 60 s for /health to return 200
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$URL/health" || echo 000)
            echo "  attempt $i → $STATUS"
            [ "$STATUS" = "200" ] && echo "✓ Healthy" && exit 0
            sleep 5
          done
          echo "⚠ Health check did not pass in time" && exit 1
